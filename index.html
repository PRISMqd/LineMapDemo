                        {/* Named site zones — right-click (desktop) or double-tap (mobile) to add line */}
            {Object.entries(SITE_COORDS).map(([site, coord]) => {
              const cx = coord.x * SVG_W / 100;
              const cy = coord.y * SVG_H / 100;
              return (
                <circle key={site} cx={cx} cy={cy} r={24} fill="transparent"
                  style={{ cursor:'crosshair', touchAction:'manipulation' }}
                  onContextMenu={e => { e.preventDefault(); handleBodyTap({ insertion_site:site, ...coord }); }}
                  onTouchEnd={e => {
                    e.preventDefault();
                    const now = Date.now();
                    const last = doubleTapRef.current[site] || 0;
                    if (now - last < 350) { doubleTapRef.current[site] = 0; handleBodyTap({ insertion_site:site, ...coord }); }
                    else doubleTapRef.current[site] = now;
                  }}
                />
              );
            })}
            {/* Full-body fallback */}
            <rect x="0" y="0" width={SVG_W} height={SVG_H} fill="transparent"
              style={{ cursor:'crosshair', touchAction:'manipulation' }}
              onContextMenu={e => {
                e.preventDefault();
                const svgEl = e.currentTarget.closest('svg');
                const rect = svgEl.getBoundingClientRect();
                const px = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
                const py = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
                handleBodyTap({ insertion_site:'custom', x: parseFloat(px), y: parseFloat(py) });
              }}
              onTouchEnd={e => {
                e.preventDefault();
                const now = Date.now();
                const last = doubleTapRef.current['_body'] || 0;
                if (now - last < 350) {
                  doubleTapRef.current['_body'] = 0;
                  const svgEl = e.currentTarget.closest('svg');
                  const rect = svgEl.getBoundingClientRect();
                  const t = e.changedTouches[0];
                  const px = ((t.clientX - rect.left) / rect.width * 100).toFixed(1);
                  const py = ((t.clientY - rect.top) / rect.height * 100).toFixed(1);
                  handleBodyTap({ insertion_site:'custom', x: parseFloat(px), y: parseFloat(py) });
                } else doubleTapRef.current['_body'] = now;
              }}
            />
          </svg>

          {/* Line dots */}
          {(() => {
            const groups = {};
            for (const line of patient.activeLines) {
              const key = line.insertion_site || 'custom';
              if (!groups[key]) groups[key] = [];
              groups[key].push(line);
            }
            return Object.entries(groups).map(([siteKey, siteLines]) => {
              const coord = SITE_COORDS[siteKey] || { x:50, y:50 };
              const x = (coord.x / 100) * SVG_W;
              const y = (coord.y / 100) * SVG_H;
              const color = lineDotColor(siteLines[0]);
              const hasAlert = siteLines.some(l => lineHasAlerts(l) && l.lumens.some(lu => [...lu.currentAssignments,...lu.ySiteAssignments].some(a => !dismissedAlerts.has(`${l.lineId}:`))));
              const isSelected = siteLines.some(l => selectedLine?.lineId === l.lineId);
              const isMulti = siteLines.length > 1;
              return (
                <div key={siteKey}
                  onClick={() => handleDotClick(siteLines[0])}
                  title={siteLines.map(l=>l.display_label).join(', ')}
                  style={{
                    position:'absolute',
                    left: x, top: y,
                    width: isMulti ? 24 : 18, height: isMulti ? 24 : 18,
                    borderRadius:'50%',
                    background: color,
                    border: hasAlert ? `2.5px solid ${color}` : isSelected ? '2.5px solid white' : '2px solid rgba(255,255,255,0.5)',
                    boxShadow: hasAlert
                      ? `0 0 0 3px ${color}44, 0 0 0 5px ${color}22`
                      : isSelected ? `0 0 0 3px ${color}55` : `0 0 6px ${color}55`,
                    transform:'translate(-50%,-50%)',
                    cursor:'pointer',
                    display:'flex', alignItems:'center', justifyContent:'center',
                    fontSize:10, fontWeight:700, color:'white',
                    transition:'transform 0.1s, box-shadow 0.15s',
                    zIndex: isSelected ? 20 : 10,
                    animation: hasAlert ? 'alertPulse 2s ease-in-out infinite' : 'none',
                  }}
                >
                  {isMulti ? siteLines.length : ''}
                </div>
              );
            });
          })()}
        </div>

        {/* Instruction hint when nothing selected */}
        {!selectedLine && (
          <div style={{ position:'absolute', bottom:24, left:'50%', transform:'translateX(-50%)', fontSize:12, color:'var(--text-muted)', fontStyle:'italic', pointerEvents:'none', whiteSpace:'nowrap' }}>
            Tap dot to inspect · Right-click or double-tap to add line
          </div>
        )}

        {/* Line popover — slides in from right */}
        {selectedLine && (
          <LinePopover
            line={selectedLine}
            allLines={patient.activeLines}
            onClose={() => setSelectedLine(null)}
            onDCLine={handleDCLine}
            dismissedAlerts={dismissedAlerts}
            onDismissAlert={handleDismissAlert}
            auditLog={auditLog}
            setAuditLog={setAuditLog}
          />
        )}
      </div>

      {/* Action bar */}
      <div style={{ padding:'0 20px', height:'var(--action-bar)', background:'#C9D9D6', borderTop:'1px solid var(--border)', display:'flex', alignItems:'center', gap:10, flexShrink:0 }}>
        <button className="btn btn-primary" onClick={() => setShowAddMed(true)}>⊕ Add Medication</button>
        <button className="btn btn-ghost" onClick={() => { setAddLinePrefill(null); setShowAddLine(true); }}>⊕ Add Line</button>
        <div style={{ flex:1 }} />
        <button className="btn btn-ghost btn-sm" onClick={() => setShowAudit(a => !a)}>Audit Log</button>
        {patient.notes && <div style={{ fontSize:11, color:'var(--text-muted)', maxWidth:200, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>📋 {patient.notes}</div>}
      </div>

      {showAddMed && <AddMedOverlay patient={patient} onClose={() => setShowAddMed(false)} onAdd={handleAddMed} setAuditLog={setAuditLog} />}
      {showAddLine && <AddLineOverlay prefill={addLinePrefill} onClose={() => { setShowAddLine(false); setAddLinePrefill(null); }} onAdd={handleAddLine} onAddMed={handleAddMed} setAuditLog={setAuditLog} patient={patient} />}
      <AuditDrawer open={showAudit} onClose={() => setShowAudit(false)} auditLog={auditLog} />
      {toast && <div className="toast">{toast}</div>}
      {dcPrompt && <DCPromptModal prompt={dcPrompt} setPrompt={setDcPrompt} onConfirm={handleDcConfirm} allLines={patient.activeLines} />}
    </div>
  );
}


// ─────────────────────────────────────────────
// ADD MEDICATION OVERLAY
// ─────────────────────────────────────────────
function AddMedOverlay({ patient, onClose, onAdd, setAuditLog }) {
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);
  const [selected, setSelected] = useState(null);
  const [engineResult, setEngineResult] = useState(null);
  const [customMode, setCustomMode] = useState(false);
  const [customForm, setCustomForm] = useState({ user_label:'', route:'IV', continuousVsIntermittent:'continuous', requiresDedicated:false, requiresCentral:false, vesicant:false, filterRequired:false, filterSize:'', manualCompatibilityNote:'' });
  const [dose, setDose] = useState('');
  const [rate, setRate] = useState('');
  const [contInt, setContInt] = useState('continuous');
  const [targetLumen, setTargetLumen] = useState('');

  useEffect(() => {
    if (query.trim().length >= 1) {
      setResults(searchMedications(query));
    } else {
      setResults([]);
    }
  }, [query]);

  const handleSelect = (med) => {
    setSelected(med);
    setQuery(med.display_name);
    setResults([]);
    const result = runAssignmentEngine(patient, { med_id: med.med_id, display_name: med.display_name, ...med });
    setEngineResult(result);
  };

  const handleAdd = () => {
    const med = selected || (customMode ? { med_id: 'custom_' + Date.now(), display_name: customForm.user_label, ...customForm } : null);
    if (!med) return;
    onAdd && onAdd({ medication: med, dose, rate, continuousVsIntermittent: contInt, targetLumen });
    setAuditLog(addAuditEntry('MED_ADD', `Medication added: ${med.display_name}${dose ? ` ${dose}` : ''}${targetLumen ? ` → ${targetLumen}` : ''}`));
    onClose();
  };

  const allLumens = patient.activeLines.flatMap(line =>
    line.lumens.map(l => ({ ...l, lineLabel: line.display_label, lineId: line.lineId }))
  );

  const stateColors = { safe_capacity_available:'var(--c-safe)', review_reconfigurable:'var(--c-warn)', new_access_recommended:'var(--c-danger)', unresolvable_escalate:'var(--c-danger)' };
  const stateLabels = { safe_capacity_available:'SAFE PLACEMENT AVAILABLE', review_reconfigurable:'REVIEW REQUIRED', new_access_recommended:'NEW ACCESS MAY BE NEEDED', unresolvable_escalate:'ESCALATE — NO SAFE PLACEMENT' };

  return (
    <div className="overlay-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="overlay-panel">
        <div className="overlay-header">
          <div className="overlay-title">Add Medication</div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="overlay-body">
          {!customMode && (
            <>
              <div className="search-input-wrap">
                <span className="search-icon">⌕</span>
                <input
                  className="search-input"
                  placeholder="Search generic, brand, abbreviation…"
                  value={query}
                  onChange={e => { setQuery(e.target.value); setSelected(null); setEngineResult(null); }}
                  autoFocus
                />
              </div>
              {results.length > 0 && (
                <div className="search-result-list">
                  {results.slice(0,8).map(med => (
                    <div key={med.med_id} className={`search-result-item${selected?.med_id === med.med_id ? ' selected' : ''}`} onClick={() => handleSelect(med)}>
                      <div className="search-result-name">{med.display_name}</div>
                      <div className="search-result-meta">{med.class} · {med.route_terms?.join(', ')}</div>
                      <div className="search-result-match">matched via {med._matchReason}</div>
                    </div>
                  ))}
                </div>
              )}
              {query.length >= 2 && results.length === 0 && !selected && (
                <div style={{ fontSize:12, color:'var(--text-muted)', padding:'8px 0' }}>
                  No results — <button className="btn btn-ghost btn-xs" onClick={() => setCustomMode(true)}>Add custom medication</button>
                </div>
              )}
            </>
          )}

          {customMode && (
            <div className="custom-med-section">
              <div className="custom-med-header">
                <span>⊕</span> Custom Medication Entry
                <button className="btn btn-ghost btn-xs" style={{ marginLeft:'auto' }} onClick={() => setCustomMode(false)}>← Back to search</button>
              </div>
              <div className="field-group">
                <div className="field-label">Medication Name *</div>
                <input className="field-input" value={customForm.user_label} onChange={e => setCustomForm(f => ({...f, user_label: e.target.value}))} placeholder="Enter medication name" />
              </div>
              <div className="field-row">
                <div className="field-group">
                  <div className="field-label">Route</div>
                  <input className="field-input" value={customForm.route} onChange={e => setCustomForm(f => ({...f, route: e.target.value}))} placeholder="e.g. IV" />
                </div>
                <div className="field-group">
                  <div className="field-label">Mode</div>
                  <select className="field-input field-select" value={customForm.continuousVsIntermittent} onChange={e => setCustomForm(f => ({...f, continuousVsIntermittent: e.target.value}))}>
                    <option value="continuous">Continuous</option>
                    <option value="intermittent">Intermittent</option>
                  </select>
                </div>
              </div>
              <div className="field-label" style={{ marginBottom:6 }}>Properties</div>
              <div className="toggle-row" style={{ marginBottom:10 }}>
                {[['requiresDedicated','Dedicated Line'],['requiresCentral','Central Preferred'],['vesicant','Vesicant'],['filterRequired','Filter Required']].map(([key, label]) => (
                  <button key={key} className={`toggle-btn${customForm[key] ? ' active' : ''}`} onClick={() => setCustomForm(f => ({...f, [key]: !f[key]}))}>
                    {label}
                  </button>
                ))}
              </div>
              {customForm.filterRequired && (
                <div className="field-group">
                  <div className="field-label">Filter Size</div>
                  <input className="field-input" value={customForm.filterSize} onChange={e => setCustomForm(f => ({...f, filterSize: e.target.value}))} placeholder="e.g. 0.22um" />
                </div>
              )}
              <div className="field-group">
                <div className="field-label">Compatibility Note</div>
                <input className="field-input" value={customForm.manualCompatibilityNote} onChange={e => setCustomForm(f => ({...f, manualCompatibilityNote: e.target.value}))} placeholder="Manual note for this medication" />
              </div>
              <div className="new-line-hint" style={{ background:'var(--c-unknown-dim)', borderColor:'rgba(107,114,128,0.3)' }}>
                ⚠ Compatibility not verified — will be marked as unknown. Pharmacy review recommended before administration.
              </div>
            </div>
          )}

          {selected && (
            <>
              <div className="divider" />
              <div className="field-row">
                <div className="field-group">
                  <div className="field-label">Dose</div>
                  <input className="field-input" value={dose} onChange={e => setDose(e.target.value)} placeholder="e.g. 1g, 0.1 mcg/kg/min" />
                </div>
                <div className="field-group">
                  <div className="field-label">Rate / Duration</div>
                  <input className="field-input" value={rate} onChange={e => setRate(e.target.value)} placeholder="e.g. over 30 min, 10 mL/hr" />
                </div>
              </div>
              <div className="field-group">
                <div className="field-label">Continuous / Intermittent</div>
                <div className="toggle-row">
                  {['continuous','intermittent'].map(v => (
                    <button key={v} className={`toggle-btn${contInt === v ? ' active' : ''}`} onClick={() => setContInt(v)}>{v}</button>
                  ))}
                </div>
              </div>
              <div className="field-group">
                <div className="field-label">Assign to Lumen (optional)</div>
                <select className="field-input field-select" value={targetLumen} onChange={e => setTargetLumen(e.target.value)}>
                  <option value="">— Let engine recommend —</option>
                  {allLumens.map(l => (
                    <option key={l.lumenId} value={l.lumenId}>{l.lineLabel} · {l.label}</option>
                  ))}
                </select>
              </div>
            </>
          )}

          {/* Engine result */}
          {engineResult && (
            <div className={`placement-result ${engineResult.overallState === 'safe_capacity_available' ? 'safe' : engineResult.overallState === 'review_reconfigurable' ? 'warn' : 'danger'}`}>
              <div className="placement-state-label" style={{ color: stateColors[engineResult.overallState] }}>
                {stateLabels[engineResult.overallState]}
              </div>
              {engineResult.alerts.map((a, i) => (
                <div key={i} style={{ fontSize:12, color: a.severity === 'high' ? 'var(--c-danger)' : a.severity === 'info' ? 'var(--accent-blue)' : 'var(--c-warn)', marginBottom:4 }}>
                  {a.severity === 'high' ? '⛔' : a.severity === 'info' ? 'ℹ' : '⚠'} {a.message}
                </div>
              ))}
              {engineResult.safePlacements.length > 0 && (
                <>
                  <div style={{ fontSize:11, color:'var(--c-safe)', fontFamily:'var(--font-mono)', marginTop:8, marginBottom:4 }}>SAFE PLACEMENTS</div>
                  {engineResult.safePlacements.map((p, i) => (
                    <div key={i} className="placement-option">
                      <div className="placement-option-label">{p.lineLabel} · {p.lumenLabel} [{p.level.toUpperCase()}]</div>
                      <div className="placement-option-meta">{p.reason}</div>
                    </div>
                  ))}
                </>
              )}
              {engineResult.cautionPlacements.length > 0 && (
                <>
                  <div style={{ fontSize:11, color:'var(--c-warn)', fontFamily:'var(--font-mono)', marginTop:8, marginBottom:4 }}>CAUTION PLACEMENTS</div>
                  {engineResult.cautionPlacements.map((p, i) => (
                    <div key={i} className="placement-option">
                      <div className="placement-option-label">{p.lineLabel} · {p.lumenLabel} [{p.level.toUpperCase()}]</div>
                      <div className="placement-option-meta" style={{ color:'var(--c-warn)' }}>{p.reason}</div>
                    </div>
                  ))}
                </>
              )}
              {engineResult.recommendations.map((r, i) => (
                <div key={i} className="rec-card" style={{ marginTop:8 }}>
                  <div className="rec-action">→ {r.action}</div>
                  <div className="rec-reason">{r.reason}</div>
                </div>
              ))}
            </div>
          )}

          {customMode && customForm.user_label && !engineResult && (
            <div className="placement-result unknown" style={{ marginTop:12 }}>
              <div className="placement-state-label" style={{ color:'var(--c-unknown)' }}>COMPATIBILITY NOT VERIFIED</div>
              <div style={{ fontSize:12, color:'var(--text-secondary)' }}>Custom medication — compatibility data unavailable. Review all current infusions manually before administering.</div>
            </div>
          )}
        </div>
        <div className="overlay-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          {!customMode && !selected && query.length >= 2 && (
            <button className="btn btn-ghost btn-sm" onClick={() => setCustomMode(true)}>Add Custom</button>
          )}
          <button
            className="btn btn-primary"
            disabled={!selected && !(customMode && customForm.user_label)}
            onClick={handleAdd}
          >
            Add Medication
          </button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// ADD LINE OVERLAY
// ─────────────────────────────────────────────
const LINE_TYPES = ['CVC','PICC','PIV','Arterial','Other'];
const INSERTION_SITES = [
  // Central
  'right_internal_jugular','left_internal_jugular',
  'right_subclavian','left_subclavian',
  'right_femoral','left_femoral',
  'midline_neck',
  // Upper limb (shoulder → fingers)
  'right_upper_arm','left_upper_arm',
  'right_antecubital','left_antecubital',
  'right_forearm','left_forearm',
  'right_radial','left_radial',
  'right_wrist','left_wrist',
  'right_hand','left_hand',
  'right_upper_extremity','left_upper_extremity',
  // Lower limb
  'right_foot','left_foot',
  'right_toe','left_toe',
  // Other
  'scalp','right_scalp','left_scalp',
  'umbilical',
  'custom',
];

function AddLineOverlay({ prefill, onClose, onAdd, onAddMed, patient, setAuditLog }) {
  const deriveSide = (s) => s?.startsWith('right') ? 'right' : s?.startsWith('left') ? 'left' : '';
  const [form, setForm] = useState({
    lineType: 'PIV',
    display_label: '',
    insertion_site: prefill?.insertion_site || '',
    side: deriveSide(prefill?.insertion_site),
    anatomical_region: '',
    lumenCount: 1,
    lumens: [{ label: 'Lumen 1', size: '' }],
    ...prefill,
  });
  const [addedLine, setAddedLine] = useState(null); // after add, offer med assignment
  const [medQuery, setMedQuery] = useState('');
  const [medResults, setMedResults] = useState([]);

  const updateLumenCount = (n) => {
    const count = Math.max(1, parseInt(n) || 1);
    const lumens = Array.from({ length: count }, (_, i) => form.lumens[i] || { label: `Lumen ${i+1}`, size: '' });
    setForm(f => { const nf={...f, lumenCount:count, lumens}; saveDraft('add_line', nf); return nf; });
  };
  // Auto-save on any field change
  const updateForm = (updates) => setForm(f => { const nf={...f,...updates}; saveDraft('add_line', nf); return nf; });

  const handleAdd = () => {
    const newLine = {
      lineId: 'L_' + Date.now(),
      lineType: form.lineType,
      display_label: form.display_label || `${form.lineType} — ${(form.insertion_site||'custom').replace(/_/g,' ')}`,
      anatomical_region: form.anatomical_region || (form.insertion_site||'').split('_').slice(1).join('_'),
      side: form.side || 'unknown',
      insertion_site: form.insertion_site || 'custom',
      map_coordinates: (() => {
        const site = form.insertion_site;
        if (site && site !== 'custom' && SITE_COORDS[site]) return SITE_COORDS[site];
        const t = form.lineType, s = form.side;
        if (t === 'CVC' || t === 'Arterial') {
          if (s === 'right') return SITE_COORDS['right_internal_jugular'];
          if (s === 'left')  return SITE_COORDS['left_internal_jugular'];
          return SITE_COORDS['midline_neck'];
        }
        if (t === 'PICC' || t === 'Midline') {
          return s === 'left' ? SITE_COORDS['left_upper_extremity'] : SITE_COORDS['right_upper_extremity'];
        }
        if (t === 'PIV') {
          if (s === 'right') return SITE_COORDS['right_antecubital'];
          if (s === 'left')  return SITE_COORDS['left_antecubital'];
          return SITE_COORDS['right_antecubital'];
        }
        return { x:50, y:50 };
      })(),
      site_status: 'active', status: 'active',
      lumens: form.lumens.map((l, i) => ({
        lumenId: 'LU_' + Date.now() + i,
        label: l.label || `Lumen ${i+1}`,
        size: l.size || null,
        currentAssignments: [], ySiteAssignments: [],
        primaryStatus: 'available', ySiteStatus: 'available',
        ySiteCapacity: 2, ySiteBlockReason: null, maxConcurrency: 2, reservedFor: null,
      }))
    };
    onAdd(newLine);
    setAuditLog(addAuditEntry('LINE_ADD', `Line added: ${newLine.display_label}`));
    // Offer med assignment
    if (onAddMed) setAddedLine(newLine);
    else onClose();
  };

  const handleMedSearch = (q) => {
    setMedQuery(q);
    setMedResults(q.trim().length >= 1 ? searchMedications(q).slice(0,6) : []);
  };
  const handleMedSelect = (med) => {
    if (onAddMed && addedLine) {
      onAddMed({ medication: med, dose:'', rate:'', continuousVsIntermittent: med.continuous_or_intermittent||'continuous', targetLumen: addedLine.lumens[0]?.lumenId });
    }
    setMedQuery(''); setMedResults([]);
  };

  return (
    <div className="overlay-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="overlay-panel">
        <div className="overlay-header">
          <div className="overlay-title">Add New Line</div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="overlay-body">
          {prefill?.insertion_site && (
            <div className="new-line-hint">
              Prefilled from body map: <strong>{prefill.insertion_site?.replace(/_/g,' ')}</strong>. Edit any field as needed.
            </div>
          )}
          <div className="field-group" style={{ marginTop: prefill ? 10 : 0 }}>
            <div className="field-label">Line Type</div>
            <div className="toggle-row">
              {LINE_TYPES.map(t => (
                <button key={t} className={`toggle-btn${form.lineType === t ? ' active' : ''}`} onClick={() => setForm(f => ({...f, lineType: t}))}>{t}</button>
              ))}
            </div>
          </div>
          <div className="field-group">
            <div className="field-label">Display Label (optional)</div>
            <input className="field-input" value={form.display_label} onChange={e => setForm(f => ({...f, display_label: e.target.value}))} placeholder="e.g. Right IJ CVC" />
          </div>
          <div className="field-row">
            <div className="field-group">
              <div className="field-label">Insertion Site</div>
              <select className="field-input field-select" value={form.insertion_site} onChange={e => setForm(f => ({...f, insertion_site: e.target.value}))}>
                <option value="">Select…</option>
                {INSERTION_SITES.map(s => <option key={s} value={s}>{s.replace(/_/g,' ')}</option>)}
              </select>
            </div>
            <div className="field-group">
              <div className="field-label">Side</div>
              <select className="field-input field-select" value={form.side} onChange={e => setForm(f => ({...f, side: e.target.value}))}>
                <option value="">Select…</option>
                <option value="right">Right</option>
                <option value="left">Left</option>
                <option value="midline">Midline</option>
              </select>
            </div>
          </div>
          <div className="field-group">
            <div className="field-label">Number of Lumens</div>
            <input className="field-input" type="number" min="1" max="10" value={form.lumenCount} onChange={e => updateLumenCount(e.target.value)} style={{ maxWidth:100 }} />
          </div>
          {form.lumens.map((l, i) => (
            <div key={i} className="field-row">
              <div className="field-group">
                <div className="field-label">Lumen {i+1} Label</div>
                <input className="field-input" value={l.label} onChange={e => {
                  const lumens = [...form.lumens];
                  lumens[i] = { ...lumens[i], label: e.target.value };
                  setForm(f => ({ ...f, lumens }));
                }} placeholder={`Lumen ${i+1}`} />
              </div>
              <div className="field-group">
                <div className="field-label">Size / Gauge</div>
                <input className="field-input" value={l.size} onChange={e => {
                  const lumens = [...form.lumens];
                  lumens[i] = { ...lumens[i], size: e.target.value };
                  setForm(f => ({ ...f, lumens }));
                }} placeholder="e.g. 18G, 4F" />
              </div>
            </div>
          ))}
          <div className="field-group">
            <div className="field-label">Notes (optional)</div>
            <input className="field-input" value={form.notes || ''} onChange={e => setForm(f => ({...f, notes: e.target.value}))} placeholder="Insertion notes, dressing date, etc." />
          </div>
        </div>
        <div className="overlay-footer">
          {!addedLine && <button className="btn btn-ghost" onClick={onClose}>Cancel</button>}
          {!addedLine && <button className="btn btn-primary" onClick={handleAdd}>Add Line</button>}
          {addedLine && <button className="btn btn-ghost" onClick={onClose}>Done — No Meds Now</button>}
        </div>
      </div>
      {/* After line added: offer med assignment */}
      {addedLine && (
        <div style={{ padding:'14px 20px', borderTop:'2px solid var(--accent)', background:'rgba(92,157,141,0.06)' }}>
          <div style={{ fontSize:13, fontWeight:700, marginBottom:8, color:'var(--accent-deep)' }}>
            ✓ {addedLine.display_label} added — assign medications now?
          </div>
          <div style={{ position:'relative', marginBottom:8 }}>
            <input
              className="search-input" style={{ paddingLeft:12 }}
              placeholder="Search medication to add…"
              value={medQuery}
              onChange={e => handleMedSearch(e.target.value)}
              autoFocus
            />
          </div>
          {medResults.length > 0 && (
            <div style={{ display:'flex', flexDirection:'column', gap:4, maxHeight:180, overflowY:'auto' }}>
              {medResults.map(med => (
                <div key={med.med_id} onClick={() => handleMedSelect(med)}
                  style={{ padding:'8px 12px', borderRadius:8, cursor:'pointer', background:'white', border:'1px solid var(--border)', display:'flex', alignItems:'center', gap:8 }}
                  onMouseOver={e => e.currentTarget.style.background='#e8efed'}
                  onMouseOut={e => e.currentTarget.style.background='white'}
                >
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, fontWeight:600 }}>{med.display_name}</div>
                    <div style={{ fontSize:10, color:'var(--text-muted)', fontFamily:'var(--font-mono)' }}>{med.class} · via {med._matchReason}</div>
                  </div>
                  <span style={{ fontSize:11, color:'var(--accent)', fontWeight:600 }}>Add +</span>
                </div>
              ))}
            </div>
          )}
          <div style={{ fontSize:11, color:'var(--text-muted)', marginTop:6, fontStyle:'italic' }}>Click a medication to assign it to the first available lumen. Add as many as needed.</div>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────
// LUMEN GROUPING ENGINE
// Computes minimum lumen groupings for a set of meds.
// Returns: array of lumen groups, each with primary med + y-site meds + flags
// ─────────────────────────────────────────────

function canYSiteTogether(medIdA, medIdB) {
  const c = getCompatibility(medIdA, medIdB, 'ySite');
  return c === 'compatible' || c === 'caution'; // caution = allowed with warning
}

function canSameLumen(medIdA, medIdB) {
  const c = getCompatibility(medIdA, medIdB, 'sameLumen');
  return c === 'compatible' || c === 'caution';
}

function yCompatStatus(medIdA, medIdB) {
  return getCompatibility(medIdA, medIdB, 'ySite');
}

// Returns array of groups: { id, primary: medId, ysite: [medId,...], dedicated, vesicant, needsCentral, filterRequired, filterSize, issues[] }
function computeMinimumLumens(medIds) {
  const meds = medIds.map(getMedById).filter(Boolean);
  const groups = []; // { id, members: [medId], dedicated, issues }

  // Sort: dedicated first (they must be alone), then vesicants, then rest
  const sorted = [...medIds].sort((a, b) => {
    const ma = getMedById(a), mb = getMedById(b);
    if (medRequiresDedicated(ma||{}) && !medRequiresDedicated(mb||{})) return -1;
    if (!medRequiresDedicated(ma||{}) && medRequiresDedicated(mb||{})) return 1;
    if (medIsVesicant(ma||{}) && !medIsVesicant(mb||{})) return -1;
    if (!medIsVesicant(ma||{}) && medIsVesicant(mb||{})) return 1;
    return 0;
  });

  for (const medId of sorted) {
    const med = getMedById(medId);
    if (!med) continue;

    // Dedicated: always its own lumen
    if (medRequiresDedicated(med)) {
      groups.push({ id: `g${groups.length}`, members: [medId], dedicated: true, issues: [] });
      continue;
    }

    // Try to fit into an existing group via Y-site
    let placed = false;
    for (const g of groups) {
      if (g.dedicated) continue;
      // Can't exceed Y-site practical limit
      if (g.members.length >= 3) continue;
      // FILTER CONFLICT: if this med requires a filter AND the primary also requires a filter -> separate lumen
      const primaryMedObj = getMedById(g.members[0]);
      if (primaryMedObj && medRequiresFilter(med) && medRequiresFilter(primaryMedObj)) continue;
      // Check compat with all existing members
      const allCompat = g.members.every(existing => {
        return canYSiteTogether(existing, medId);
      });
      if (allCompat) {
        g.members.push(medId);
        placed = true;
        break;
      }
    }
    if (!placed) {
      groups.push({ id: `g${groups.length}`, members: [medId], dedicated: false, issues: [] });
    }
  }

  // Annotate each group
  return groups.map((g, i) => {
    const primary = g.members[0];
    const ysite = g.members.slice(1);
    const primaryMed = getMedById(primary);
    const issues = [];

    // Check all pairs within group
    for (let a = 0; a < g.members.length; a++) {
      for (let b = a+1; b < g.members.length; b++) {
        const ctx = a === 0 ? 'ySite' : 'sameLumen';
        const c = getCompatibility(g.members[a], g.members[b], ctx);
        if (c === 'caution') issues.push({ sev:'warn', pair:[g.members[a],g.members[b]], msg:`Caution: ${getMedById(g.members[a])?.display_name} + ${getMedById(g.members[b])?.display_name}` });
        if (c === 'unknown') issues.push({ sev:'unknown', pair:[g.members[a],g.members[b]], msg:`Not verified: ${getMedById(g.members[a])?.display_name} + ${getMedById(g.members[b])?.display_name}` });
        if (c === 'incompatible') issues.push({ sev:'danger', pair:[g.members[a],g.members[b]], msg:`Incompatible: ${getMedById(g.members[a])?.display_name} + ${getMedById(g.members[b])?.display_name}` });
      }
    }

    return {
      id: g.id,
      lumenNum: i + 1,
      primary,
      ysite,
      dedicated: g.dedicated,
      vesicant: primaryMed?.vesicant || ysite.some(m => getMedById(m)?.vesicant),
      needsCentral: (primaryMed && medRequiresCentral(primaryMed)) || ysite.some(m => { const mx=getMedById(m); return mx && medRequiresCentral(mx); }),
      filterRequired: (primaryMed && medRequiresFilter(primaryMed)) || ysite.some(m => { const mx=getMedById(m); return mx && medRequiresFilter(mx); }),
      filterSize: [primaryMed, ...ysite.map(getMedById)].filter(Boolean).map(m => medFilterSize(m)).find(Boolean),
      issues,
    };
  });
}

const QC_DEMO_SCENARIO = [
  'norepinephrine','dopamine','epinephrine',   // 3 pressors

  'fentanyl',                                   // fentanyl
  'heparin',                                    // heparin
  'insulin',                                    // insulin
  'ns',                                         // continuous fluids
  'vancomycin',                                 // intermittent abx
  'piperacillin_tazobactam',                   // intermittent abx
];

function MedChip({ medId, isDragging, onDragStart, onDragEnd, dimmed }) {
  const med = getMedById(medId);
  if (!med) return null;
  const isVesicant = med.vesicant;
  const isDedicated = medRequiresDedicated(med);
  const needsCentral = medRequiresCentral(med);
  const chipColor = isDedicated ? 'var(--c-dedicated)' : isVesicant ? 'var(--c-danger)' : needsCentral ? 'var(--c-warn)' : 'var(--text-secondary)';
  const chipBg = isDedicated ? 'rgba(63,110,103,0.15)' : isVesicant ? 'rgba(194,45,77,0.12)' : needsCentral ? 'rgba(209,194,71,0.18)' : 'rgba(242,246,245,0.8)';

  return (
    <div
      draggable
      onDragStart={e => { e.dataTransfer.setData('medId', medId); onDragStart && onDragStart(medId); }}
      onDragEnd={onDragEnd}
      style={{
        display:'inline-flex', alignItems:'center', gap:5,
        padding:'5px 10px', borderRadius:20,
        background: chipBg, border:`1px solid ${chipColor}`,
        color: chipColor, fontSize:12, fontWeight:500,
        cursor:'grab', userSelect:'none',
        opacity: dimmed ? 0.35 : isDragging ? 0.5 : 1,
        transition:'opacity 0.15s',
        whiteSpace:'nowrap', flexShrink:0,
      }}
    >
      {isDedicated && <span style={{fontSize:9,fontFamily:'var(--font-mono)',fontWeight:700}}>DED</span>}
      {isVesicant && !isDedicated && <span style={{fontSize:9,fontFamily:'var(--font-mono)',fontWeight:700}}>V</span>}
      {needsCentral && !isVesicant && !isDedicated && <span style={{fontSize:9,fontFamily:'var(--font-mono)',fontWeight:700}}>C</span>}
      {med.display_name}
    </div>
  );
}

function LumenGroupCard({ group, allGroups, draggingMed, onDropMed, onDragStart, onDragEnd, onMoveMed }) {
  const [dragOver, setDragOver] = useState(false);
  const primaryMed = getMedById(group.primary);
  const hasDanger = group.issues.some(i => i.sev === 'danger');
  const hasWarn = group.issues.some(i => i.sev === 'warn');
  const hasUnknown = group.issues.some(i => i.sev === 'unknown');
  const borderColor = hasDanger ? 'var(--c-danger)' : hasWarn ? 'var(--c-warn)' : hasUnknown ? 'var(--c-unknown)' : group.dedicated ? 'var(--c-dedicated)' : group.needsCentral ? 'rgba(59,130,246,0.4)' : 'var(--border-active)';
  const headerBg = hasDanger ? 'rgba(194,45,77,0.12)' : hasWarn ? 'rgba(209,194,71,0.15)' : group.dedicated ? 'rgba(63,110,103,0.12)' : 'var(--bg-panel)';

  const handleDrop = e => {
    e.preventDefault();
    setDragOver(false);
    const medId = e.dataTransfer.getData('medId');

  return (
    <div
      style={{
        background: dragOver ? 'rgba(92,157,141,0.1)' : '#F2F6F5',
        border: `1.5px solid ${dragOver ? 'var(--accent-blue)' : borderColor}`,
        borderRadius: 12, overflow:'hidden', minWidth:200, maxWidth:240, flex:'0 0 auto',
        transition:'border-color 0.15s, background 0.15s',
      }}
      onDragOver={e => { e.preventDefault(); setDragOver(true); }}
      onDragLeave={() => setDragOver(false)}

      {/* Header */}
      <div style={{ background: headerBg, padding:'10px 12px', borderBottom:`1px solid ${borderColor}30`, display:'flex', alignItems:'center', gap:8 }}>
        <div style={{ fontFamily:'var(--font-mono)', fontSize:11, fontWeight:700, color:'var(--text-muted)' }}>LUMEN {group.lumenNum}</div>
        <div style={{ flex:1 }} />
        {group.dedicated && <span style={{ fontSize:9, fontFamily:'var(--font-mono)', color:'var(--c-dedicated)', fontWeight:700 }}>DEDICATED</span>}
        {group.needsCentral && <span style={{ fontSize:9, fontFamily:'var(--font-mono)', color:'var(--accent-blue)', fontWeight:700 }}>CENTRAL</span>}
        {group.vesicant && <span style={{ fontSize:9, fontFamily:'var(--font-mono)', color:'var(--c-danger)', fontWeight:700 }}>VESICANT</span>}
        {group.filterRequired && <span style={{ fontSize:9, fontFamily:'var(--font-mono)', color:'var(--c-warn)', fontWeight:700 }}>FILTER {group.filterSize || ''}</span>}
      </div>

      {/* Primary */}
      <div style={{ padding:'10px 12px 0' }}>
        <div style={{ fontSize:10, color:'var(--text-muted)', fontFamily:'var(--font-mono)', marginBottom:5 }}>PRIMARY</div>
        <div style={{ marginBottom: group.ysite.length ? 0 : 10 }}>
          <MedChip medId={group.primary} onDragStart={onDragStart} onDragEnd={onDragEnd} dimmed={draggingMed === group.primary} />
        </div>
      </div>

      {/* Y-site */}
      {group.ysite.length > 0 && (
        <div style={{ padding:'8px 12px 4px' }}>
          <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:6 }}>
            <div style={{ flex:1, height:1, background:'var(--accent-blue)', opacity:0.3 }} />
            <div style={{ fontSize:9, color:'var(--accent-blue)', fontFamily:'var(--font-mono)', opacity:0.8 }}>Y-SITE</div>
            <div style={{ flex:1, height:1, background:'var(--accent-blue)', opacity:0.3 }} />
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
            {group.ysite.map(mId => (
              <MedChip key={mId} medId={mId} onDragStart={onDragStart} onDragEnd={onDragEnd} dimmed={draggingMed === mId} />
            ))}
          </div>
        </div>
      )}

      {/* Drop zone hint */}
      {draggingMed && draggingMed !== group.primary && !group.ysite.includes(draggingMed) && (
        <div style={{ margin:'8px 12px', padding:'6px', border:'1px dashed var(--accent-blue)', borderRadius:6, textAlign:'center', fontSize:11, color:'var(--accent-blue)', opacity:0.7 }}>
          Drop to reassign
        </div>
      )}

      {/* Issues */}
      {group.issues.length > 0 && (
        <div style={{ padding:'6px 12px 10px' }}>
          {group.issues.map((issue, i) => (
            <div key={i} style={{
              fontSize:11, marginTop:4,
              color: issue.sev === 'danger' ? 'var(--c-danger)' : issue.sev === 'warn' ? 'var(--c-warn)' : 'var(--c-unknown)',
            }}>
              {issue.sev === 'danger' ? '⛔' : issue.sev === 'warn' ? '⚠' : '?'} {issue.msg}
            </div>
          ))}
        </div>
      )}
      {group.issues.length === 0 && (
        <div style={{ padding:'0 12px 10px', fontSize:10, color:'var(--c-safe)', fontFamily:'var(--font-mono)', marginTop:6 }}>✓ Compatible</div>
      )}
    </div>
  );
}

function QuickCheck({ onClose }) {
  const [medInputs, setMedInputs] = useState(QC_DEMO_SCENARIO.map(id => getMedById(id)?.display_name || ''));
  const [resolvedMeds, setResolvedMeds] = useState([]);
  const [groups, setGroups] = useState([]);
  const [unresolved, setUnresolved] = useState([]);
  const [draggingMed, setDraggingMed] = useState(null);
  const [view, setView] = useState('input'); // 'input' | 'plan'
  const [searchResults, setSearchResults] = useState({});
  const [focusedInput, setFocusedInput] = useState(null);

  const addMedInput = () => setMedInputs(m => [...m, '']);
  const removeMedInput = (i) => setMedInputs(m => m.filter((_, idx) => idx !== i));
  const updateMedInput = (i, v) => {
    setMedInputs(m => { const n=[...m]; n[i]=v; return n; });
    const results = searchMedications(v);
    setSearchResults(r => ({ ...r, [i]: results.slice(0,5) }));
  };
  const selectMed = (i, med) => {
    setMedInputs(m => { const n=[...m]; n[i]=med.display_name; return n; });
    setSearchResults(r => ({ ...r, [i]: [] }));
    setFocusedInput(null);
  };

  const runPlan = () => {
    const found = [], notFound = [];
    for (const q of medInputs) {
      if (!q.trim()) continue;
      const res = searchMedications(q);
      if (res.length > 0) found.push(res[0].med_id);
      else notFound.push(q);
    }
    setResolvedMeds(found);
    setUnresolved(notFound);
    const computed = computeMinimumLumens(found);
    setGroups(computed);
    setView('plan');
  };

  // Drag: move med from one group to another
  const handleDropMed = (medId, targetGroupId) => {
    setGroups(prev => {
      // Remove from source
      const updated = prev.map(g => ({
        ...g,
        members: g.members.filter(m => m !== medId),
        primary: g.primary === medId ? (g.members[1] || null) : g.primary,
        ysite: g.ysite.filter(m => m !== medId),
      })).filter(g => g.primary !== null && g.members.length > 0);

      // Add to target
      return updated.map(g => {
        if (g.id !== targetGroupId) return g;
        const newMembers = [...g.members, medId];
        const newYsite = newMembers.slice(1);
        // Recompute issues
        const issues = [];
        for (let a = 0; a < newMembers.length; a++) {
          for (let b = a+1; b < newMembers.length; b++) {
            const ctx = a === 0 ? 'ySite' : 'sameLumen';
            const c = getCompatibility(newMembers[a], newMembers[b], ctx);
            if (c === 'caution') issues.push({ sev:'warn', pair:[newMembers[a],newMembers[b]], msg:`Caution: ${getMedById(newMembers[a])?.display_name} + ${getMedById(newMembers[b])?.display_name}` });
            if (c === 'unknown') issues.push({ sev:'unknown', pair:[newMembers[a],newMembers[b]], msg:`Not verified: ${getMedById(newMembers[a])?.display_name} + ${getMedById(newMembers[b])?.display_name}` });
            if (c === 'incompatible') issues.push({ sev:'danger', pair:[newMembers[a],newMembers[b]], msg:`Incompatible: ${getMedById(newMembers[a])?.display_name} + ${getMedById(newMembers[b])?.display_name}` });
          }
        }
        const primaryMed = getMedById(newMembers[0]);
        return {
          ...g,
          members: newMembers,
          primary: newMembers[0],
          ysite: newYsite,
          dedicated: (primaryMed && medRequiresDedicated(primaryMed)) || false,
          vesicant: newMembers.some(m => getMedById(m)?.vesicant),
          needsCentral: newMembers.some(m => { const mx=getMedById(m); return mx && medRequiresCentral(mx); }),
          filterRequired: newMembers.some(m => { const mx=getMedById(m); return mx && medRequiresFilter(mx); }),
          filterSize: newMembers.map(m => { const mx=getMedById(m); return mx ? medFilterSize(mx) : null; }).find(Boolean),
          issues,
        };
      });
    });
  };

  // Eject med to its own new lumen
  const ejectToNewLumen = (medId) => {
    setGroups(prev => {
      const cleaned = prev.map(g => {
        if (!g.members.includes(medId)) return g;
        const newMembers = g.members.filter(m => m !== medId);
        if (newMembers.length === 0) return null;
        const issues = [];
        for (let a = 0; a < newMembers.length; a++) {
          for (let b = a+1; b < newMembers.length; b++) {
            const c = getCompatibility(newMembers[a], newMembers[b], a===0?'ySite':'sameLumen');
            if (c !== 'compatible') issues.push({ sev: c === 'incompatible' ? 'danger' : c === 'unknown' ? 'unknown' : 'warn', pair:[newMembers[a],newMembers[b]], msg:`${c}: ${getMedById(newMembers[a])?.display_name} + ${getMedById(newMembers[b])?.display_name}` });
          }
        }
        const pm = getMedById(newMembers[0]);
        return { ...g, members: newMembers, primary: newMembers[0], ysite: newMembers.slice(1), vesicant: newMembers.some(m=>getMedById(m)?.vesicant), needsCentral: newMembers.some(m=>getMedById(m)?.requiresCentral), filterRequired: newMembers.some(m=>getMedById(m)?.filterRequired), filterSize: newMembers.map(m=>getMedById(m)?.filterSize).find(Boolean), dedicated: pmedRequiresDedicated(m||{})||false, issues };
      }).filter(Boolean);
      const newId = `g_new_${Date.now()}`;
      const med = getMedById(medId);
      cleaned.push({ id: newId, lumenNum: cleaned.length+1, members:[medId], primary: medId, ysite: [], dedicated: medRequiresDedicated(med||{})||false, vesicant: medIsVesicant(med||{})||false, needsCentral: med?.requiresCentral||false, filterRequired: medRequiresFilter(med||{})||false, filterSize: med?.filterSize, issues: [] });
      return cleaned.map((g, i) => ({ ...g, lumenNum: i+1 }));
    });
  };

  const totalDanger = groups.reduce((s,g) => s + g.issues.filter(i=>i.sev==='danger').length, 0);
  const totalWarn = groups.reduce((s,g) => s + g.issues.filter(i=>i.sev==='warn'||i.sev==='unknown').length, 0);
  const centralRequired = groups.filter(g=>g.needsCentral).length;

  return (
    <div className="qc-overlay">
      <div className="qc-header" style={{ gap:16 }}>
        <button className="btn btn-ghost btn-sm" onClick={onClose}>← Back</button>
        <div style={{ display:'flex', flexDirection:'column', gap:2 }}>
          <div style={{ fontSize:15, fontWeight:700 }}>Quick Check — Lumen Planner</div>
          <div style={{ fontSize:11, color:'var(--text-muted)' }}>Emergency / triage mode · Enter all meds → get minimum lumen map</div>
        </div>
        <div style={{ flex:1 }} />
        {view === 'plan' && (
          <div style={{ display:'flex', gap:8, alignItems:'center' }}>
            {totalDanger > 0 && <span style={{ fontFamily:'var(--font-mono)', fontSize:12, color:'var(--c-danger)', fontWeight:700 }}>⛔ {totalDanger} CONFLICT{totalDanger>1?'S':''}</span>}
            {totalWarn > 0 && <span style={{ fontFamily:'var(--font-mono)', fontSize:12, color:'var(--c-warn)', fontWeight:700 }}>⚠ {totalWarn} CAUTION{totalWarn>1?'S':''}</span>}
            {totalDanger === 0 && totalWarn === 0 && <span style={{ fontFamily:'var(--font-mono)', fontSize:12, color:'var(--c-safe)', fontWeight:700 }}>✓ PLAN CLEAR</span>}
            <button className="btn btn-ghost btn-sm" onClick={() => setView('input')}>← Edit Meds</button>
          </div>
        )}
      </div>

      {view === 'input' ? (
        <div style={{ flex:1, overflowY:'auto', padding:20, maxWidth:720, margin:'0 auto', width:'100%' }}>
          {/* Mode hint */}
          <div style={{ display:'flex', gap:8, marginBottom:16, padding:'10px 14px', background:'var(--c-warn-dim)', border:'1px solid rgba(245,158,11,0.25)', borderRadius:10 }}>
            <div style={{ fontSize:13, color:'var(--c-warn)' }}>⚡</div>
            <div style={{ fontSize:12, color:'var(--text-secondary)' }}>
              <strong style={{ color:'var(--text-primary)' }}>Blown PIV? Rapid reassignment?</strong> Enter all meds that need a home. The planner will show the minimum number of lumens and what can Y-site together. Drag chips to rearrange.
            </div>
          </div>

          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
            <div className="section-label">Medications ({medInputs.filter(m=>m.trim()).length} entered)</div>
            <button className="btn btn-ghost btn-xs" onClick={() => { setMedInputs(QC_DEMO_SCENARIO.map(id => getMedById(id)?.display_name||'')); }}>Load demo scenario</button>
          </div>

          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:12 }}>
            {medInputs.map((m, i) => (
              <div key={i} style={{ position:'relative' }}>
                <div style={{ display:'flex', gap:6 }}>
                  <div style={{ position:'relative', flex:1 }}>
                    <input
                      className="search-input"
                      style={{ paddingLeft:12 }}
                      placeholder={`Medication ${i+1}…`}
                      value={m}
                      onChange={e => updateMedInput(i, e.target.value)}
                      onFocus={() => setFocusedInput(i)}
                      onBlur={() => setTimeout(() => setFocusedInput(null), 150)}
                    />
                    {focusedInput === i && searchResults[i]?.length > 0 && (
                      <div style={{
                        position:'absolute', top:'100%', left:0, right:0, zIndex:50,
                        background:'var(--bg-panel)', border:'1px solid var(--border-active)',
                        borderRadius:8, boxShadow:'0 8px 24px rgba(0,0,0,0.4)',
                        overflow:'hidden',
                      }}>
                        {searchResults[i].map(r => (
                          <div key={r.med_id}
                            style={{ padding:'8px 12px', cursor:'pointer', fontSize:12, borderBottom:'1px solid var(--border)', background:'transparent' }}
                            onMouseDown={() => selectMed(i, r)}
                            className="search-result-item"
                          >
                            <div style={{ fontWeight:500 }}>{r.display_name}</div>
                            <div style={{ fontSize:10, color:'var(--text-muted)' }}>{r.class} · via {r._matchReason}</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                  <button onClick={() => removeMedInput(i)} style={{ background:'transparent', border:'1px solid var(--border)', borderRadius:6, color:'var(--text-muted)', cursor:'pointer', padding:'0 8px', fontSize:14, flexShrink:0 }}>✕</button>
                </div>
              </div>
            ))}
          </div>

          <div style={{ display:'flex', gap:8, marginBottom:8 }}>
            <button className="btn btn-ghost btn-sm" onClick={addMedInput}>+ Add Medication</button>
            <button className="btn btn-primary" onClick={runPlan} disabled={!medInputs.some(m=>m.trim())}>
              Plan Minimum Lumens →

          <div style={{ fontSize:11, color:'var(--text-dim)', marginTop:4 }}>
            Abbreviations, brand names, and generics all work. Unknown meds default to incompatible with all.
          </div>
        </div>
      ) : (
        <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
          {/* Summary banner */}
          <div style={{ padding:'12px 20px', borderBottom:'1px solid var(--border)', background:'var(--bg-panel)', display:'flex', gap:20, alignItems:'center', flexWrap:'wrap' }}>
            <div style={{ display:'flex', gap:6, alignItems:'center' }}>
              <div style={{ fontSize:28, fontWeight:700, fontFamily:'var(--font-mono)', color: totalDanger > 0 ? 'var(--c-danger)' : 'var(--c-safe)' }}>{groups.length}</div>
              <div style={{ fontSize:12, color:'var(--text-muted)' }}>LUMEN{groups.length!==1?'S':''}<br/>MINIMUM</div>
            </div>
            <div style={{ width:1, height:36, background:'var(--border)' }} />
            <div>
              <div style={{ fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)', marginBottom:4 }}>BREAKDOWN</div>
              <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                {groups.filter(g=>g.dedicated).length > 0 && <span className="pl-badge badge-ded">{groups.filter(g=>g.dedicated).length} dedicated</span>}
                {centralRequired > 0 && <span className="pl-badge badge-blue">{centralRequired} central req.</span>}
                {groups.filter(g=>g.ysite.length>0).length > 0 && <span className="pl-badge badge-gray">{groups.filter(g=>g.ysite.length>0).length} with Y-site</span>}

                {groups.filter(g=>g.filterRequired).length > 0 && <span className="pl-badge badge-warn">{groups.filter(g=>g.filterRequired).length} need filter</span>}

            <div style={{ fontSize:11, color:'var(--text-dim)', fontStyle:'italic' }}>Drag chips to rearrange · Conflicts update live</div>
          </div>

          {/* Lumen diagram — horizontal scroll */}
          <div style={{ flex:1, overflowX:'auto', overflowY:'hidden', padding:'20px 20px 0' }}>
            <div style={{ display:'flex', gap:12, alignItems:'flex-start', height:'100%', paddingBottom:20 }}>
              {groups.map(group => (
                <LumenGroupCard
                  key={group.id}
                  group={group}
                  allGroups={groups}
                  draggingMed={draggingMed}
                  onDropMed={handleDropMed}
                  onDragStart={setDraggingMed}
                  onDragEnd={() => setDraggingMed(null)}
                  onMoveMed={ejectToNewLumen}
                />
              ))}

              {/* New lumen drop zone */}
              {draggingMed && (
                <div
                  style={{
                    minWidth:180, border:'2px dashed var(--accent-blue)',
                    borderRadius:12, display:'flex', alignItems:'center', justifyContent:'center',
                    padding:'30px 16px', color:'var(--accent-blue)', fontSize:12,
                    fontFamily:'var(--font-mono)', opacity:0.7, flexShrink:0,
                  }}
                  onDragOver={e => e.preventDefault()}
                  onDrop={e => {
                    e.preventDefault();
                    const medId = e.dataTransfer.getData('medId');
                    if (medId) ejectToNewLumen(medId);
                  }}
                >
                  + NEW LUMEN
                </div>
              )}
            </div>
          </div>

          {/* Legend */}
          <div style={{ padding:'10px 20px', borderTop:'1px solid var(--border)', background:'var(--bg-panel)', display:'flex', gap:16, flexWrap:'wrap', alignItems:'center' }}>
            <div style={{ fontSize:10, color:'var(--text-dim)', fontFamily:'var(--font-mono)', textTransform:'uppercase', letterSpacing:'0.06em' }}>Chip key:</div>
            {[['DED','var(--c-dedicated)','var(--c-dedicated-dim)','Dedicated lumen required'],['V','var(--c-danger)','var(--c-danger-dim)','Vesicant'],['C','var(--c-warn)','var(--c-warn-dim)','Central access preferred']].map(([tag,col,bg,label]) => (
              <div key={tag} style={{ display:'flex', alignItems:'center', gap:5, fontSize:11 }}>
                <span style={{ padding:'2px 6px', borderRadius:10, background:bg, border:`1px solid ${col}`, color:col, fontSize:9, fontFamily:'var(--font-mono)', fontWeight:700 }}>{tag}</span>
                <span style={{ color:'var(--text-muted)' }}>{label}</span>
              </div>
            ))}
            <div style={{ flex:1 }} />
            <div style={{ fontSize:11, color:'var(--text-dim)', fontStyle:'italic' }}>
              This plan does not replace full patient context or pharmacy verification.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────
// AUDIT DRAWER
// ─────────────────────────────────────────────
function AuditDrawer({ open, onClose, auditLog }) {
  return (
    <div className={`audit-drawer${open ? ' open' : ''}`}>
      <div className="audit-drawer-header">
        <div style={{ flex:1, fontWeight:600, fontSize:14 }}>Audit Log</div>
        <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
      </div>
      <div className="audit-drawer-body">
        {auditLog.length === 0 && <div className="no-alerts">No audit entries yet</div>}
        {auditLog.map(entry => (
          <div key={entry.id} className="audit-entry">
            <div className="audit-entry-time">{entry.time}</div>
            <div className="audit-entry-type">{entry.type}</div>
            <div className="audit-entry-detail">{entry.detail}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// PATIENT WORKSPACE
// ─────────────────────────────────────────────
function PatientList({ patients, onSelect, onQuickCheck }) {
  return (
    <div className="patient-list">
      <div className="pl-header">
        <div>
          <div className="pl-title">Patient Access Board</div>
          <div className="pl-subtitle">{patients.length} patients · LineLogic ICU View</div>
        </div>
        <div style={{ flex:1 }} />
        {listDrafts().length > 0 && (
          <button style={{ fontSize:11, padding:'4px 10px', borderRadius:6, background:'rgba(200,134,10,0.12)', border:'1px solid rgba(200,134,10,0.4)', color:'#C8860A', cursor:'pointer', fontFamily:'var(--font-sans)', fontWeight:600 }}
            title="Unsaved entries from this session">
            ✏ {listDrafts().length} draft{listDrafts().length!==1?'s':''}
          </button>
        )}
        <button className="btn btn-ghost btn-sm">+ New Patient</button>
      </div>
      <div className="pl-body">
        {patients.map(patient => {
          const ps = computePatientState(patient);
          const totalMeds = patient.activeLines.reduce((s,l) => s + l.lumens.reduce((ss,lu) => ss + lu.currentAssignments.length + lu.ySiteAssignments.length, 0), 0);
          const totalLines = patient.activeLines.length;
          const dotClass = ps.state === 'unsafe' ? 'state-danger' : ps.state === 'warn' ? 'state-warn' : ps.state === 'dedicated' ? 'state-ded' : ps.state === 'safe' ? 'state-safe' : 'state-unknown';
          const badgeClass = ps.state === 'unsafe' ? 'badge-danger' : ps.state === 'warn' ? 'badge-warn' : ps.state === 'dedicated' ? 'badge-ded' : ps.state === 'safe' ? 'badge-safe' : 'badge-unknown';
          return (
            <div key={patient.patientId} className="pl-row" onClick={() => onSelect(patient)}>
              <div className={`pl-state-dot ${dotClass}`} style={{ boxShadow:`0 0 6px ${ps.color}55` }} />
              <div>
                <div className="pl-room">{patient.location}</div>
              </div>
              <div className="pl-info">
                <div className="pl-name">{patient.name}</div>
                <div className="pl-meta">{patient.service} · {totalLines} line{totalLines !== 1?'s':''} · {totalMeds} active infusion{totalMeds !== 1?'s':''}</div>
              </div>
              <div className="pl-badges">
                <span className={`pl-badge ${badgeClass}`} title={ps.tooltip}>{ps.label.length>12?ps.label.slice(0,12)+'…':ps.label}</span>
                {patient.acuityFlag === 'high' && <span className="pl-badge badge-danger">HIGH ACUITY</span>}
                {patient.activeLines.some(l => l.lumens.some(lu => lu.currentAssignments.some(a => a.vesicant))) && (
                  <span className="pl-badge badge-warn">VESICANT</span>
                )}
                {patient.activeLines.some(l => l.lumens.some(lu => lu.reservedFor)) && (
                  <span className="pl-badge badge-ded">DEDICATED</span>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// CLOCK
// ─────────────────────────────────────────────
function Clock() {
  const [time, setTime] = useState(new Date().toLocaleTimeString());
  useEffect(() => {
    const t = setInterval(() => setTime(new Date().toLocaleTimeString()), 1000);
    return () => clearInterval(t);
  }, []);
  return <span className="topbar-time">{time}</span>;
}

// ─────────────────────────────────────────────
// ROOT APP
// ─────────────────────────────────────────────
function App() {
  const [patients, setPatients] = useState(DEMO_PATIENTS);
  const [selectedPatient, setSelectedPatient] = useState(null);
  const [showQuickCheck, setShowQuickCheck] = useState(false);
  const [auditLog, setAuditLog] = useState([]);

  return (
    <div className="app">
      <div className="topbar">
        <div className="topbar-logo">LINE<span>MAP</span></div>
        <div className="topbar-divider" />
        <div className="topbar-section">PRISMqd LineLogic</div>
        <div className="topbar-spacer" />
        <button className="btn btn-qc btn-sm" onClick={() => setShowQuickCheck(q=>!q)} style={{fontSize:12}}>
          ⚡ Quick Check
        </button>
        {(selectedPatient || showQuickCheck) && (
          <button
            onClick={() => { setSelectedPatient(null); setShowQuickCheck(false); }}
            style={{
              display:'flex', alignItems:'center', gap:5,
              padding:'5px 12px', borderRadius:8,
              background:'rgba(175,212,207,0.15)', border:'1.5px solid rgba(175,212,207,0.4)',
              color:'#F2F6F5', fontWeight:600, fontSize:12,
              cursor:'pointer', fontFamily:'var(--font-sans)',
            }}
          >
            ◂ Patients
          </button>
        )}
        <Clock />
      </div>

      <div className="screen">
        {showQuickCheck ? (
          <QuickCheck onClose={() => setShowQuickCheck(false)} />
        ) : selectedPatient ? (
          <PatientWorkspace
            patient={selectedPatient}
            onBack={() => setSelectedPatient(null)}
            auditLog={auditLog}
            setAuditLog={setAuditLog}
          />
        ) : (
          <PatientList
            patients={patients}
            onSelect={p => { setSelectedPatient(p); setAuditLog(al => [{ id: Date.now(), time: new Date().toLocaleTimeString(), type:'PATIENT_OPEN', detail:`Opened workspace: ${p.name} (${p.location})` }, ...al]); }}
            onQuickCheck={() => setShowQuickCheck(true)}
          />
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
